<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1a2e">
<title>Recetario GCG</title>
<style>
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --accent:#c8502a;
  --accent2:#e8724a;
  --text:#1a1208;
  --text2:#5c4d3a;
  --text3:#9c8c78;
  --border:#e0d8cc;
  --radius:14px;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}

/* HEADER */
.header{background:var(--accent);padding:16px 20px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-logo{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:-0.3px;flex:1}
.header-count{color:rgba(255,255,255,0.7);font-size:13px;font-family:sans-serif}

/* SEARCH BAR */
.search-wrap{background:var(--surface);padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.search-input{flex:1;height:44px;padding:0 14px 0 40px;border:1.5px solid var(--border);border-radius:22px;font-size:15px;font-family:sans-serif;background:var(--surface2);color:var(--text);outline:none;-webkit-appearance:none;position:relative}
.search-input:focus{border-color:var(--accent);background:#fff}
.search-wrap-inner{flex:1;position:relative}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:16px;font-style:normal}
.filter-btn{height:44px;padding:0 14px;border:1.5px solid var(--border);border-radius:22px;background:var(--surface2);color:var(--text2);font-size:13px;font-family:sans-serif;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* FILTER DRAWER */
.filter-drawer{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;max-height:0;transition:max-height 0.25s ease}
.filter-drawer.open{max-height:200px}
.filter-inner{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;overflow-y:auto;max-height:200px}
.filter-chip{padding:7px 14px;border-radius:20px;font-size:13px;font-family:sans-serif;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.15s}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* LIST */
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.list-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:600px){.list-grid{grid-template-columns:1fr 1fr 1fr}}

.recipe-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;-webkit-user-select:none}
.recipe-card:active{transform:scale(0.97);box-shadow:none}
.recipe-card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px;font-family:sans-serif}
.recipe-card-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(200,80,42,0.1);color:var(--accent);margin-bottom:5px;font-family:sans-serif}
.recipe-card-meta{font-size:11px;color:var(--text3);font-family:sans-serif}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-family:sans-serif}
.empty-state-icon{font-size:48px;margin-bottom:12px}

.results-bar{font-size:12px;color:var(--text3);font-family:sans-serif;padding:4px 4px 8px;letter-spacing:0.3px}

/* DETAIL VIEW */
.detail-view{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);max-width:900px;margin:0 auto}
.detail-view.open{transform:translateX(0)}

.detail-header{background:var(--accent);padding:16px 20px;flex-shrink:0;display:flex;align-items:flex-start;gap:12px}
.back-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.detail-title-wrap{flex:1;min-width:0}
.detail-name{color:#fff;font-size:16px;font-weight:700;line-height:1.3;font-family:sans-serif;word-break:break-word}
.detail-source{color:rgba(255,255,255,0.75);font-size:12px;font-family:sans-serif;margin-top:2px}

.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

.scale-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border)}
.scale-label{font-size:11px;font-family:sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px}
.scale-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.qty-controls{display:flex;align-items:center;gap:0;background:var(--surface2);border-radius:22px;border:1.5px solid var(--border);overflow:hidden}
.qty-btn{width:44px;height:44px;border:none;background:transparent;color:var(--accent);font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-input{width:70px;height:44px;border:none;background:transparent;text-align:center;font-size:17px;font-weight:600;color:var(--text);font-family:sans-serif;outline:none;-webkit-appearance:none}
.unit-tabs{display:flex;gap:6px;flex-wrap:wrap}
.unit-tab{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-family:sans-serif;cursor:pointer;transition:all 0.15s}
.unit-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.metrics-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.metric-box{background:var(--surface);border-radius:12px;padding:12px;border:1px solid var(--border);text-align:center}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-family:sans-serif;margin-bottom:4px}
.metric-val{font-size:17px;font-weight:700;color:var(--text);font-family:sans-serif;line-height:1.2}
.metric-sub{font-size:10px;color:var(--text3);font-family:sans-serif}

.ing-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.ing-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-family:sans-serif;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;display:flex;justify-content:space-between}
.ing-row{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-row:nth-child(even){background:#faf8f5}
.ing-name{flex:1;font-size:13px;color:var(--text);font-family:sans-serif;padding-right:8px;line-height:1.3}
.ing-amounts{text-align:right;flex-shrink:0}
.ing-base{font-size:12px;color:var(--text3);font-family:sans-serif}
.ing-scaled{font-size:14px;font-weight:700;color:var(--accent);font-family:sans-serif}
.ing-lb{font-size:11px;color:var(--text3);font-family:sans-serif}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">🍽</div>
    <div>
      <div class="header-title">Recetario GCG</div>
      <div class="header-count" id="hdr-count"></div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-wrap-inner">
      <i class="search-icon">🔍</i>
      <input class="search-input" id="search" type="search" placeholder="Buscar receta o ingrediente…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="filterRecipes()">
    </div>
    <button class="filter-btn" id="filter-toggle-btn" onclick="toggleFilter()">⚙ Fuente</button>
  </div>
  <div class="filter-drawer" id="filter-drawer">
    <div class="filter-inner" id="filter-chips"></div>
  </div>
  <div class="list-scroll" id="list-scroll">
    <div class="results-bar" id="results-bar"></div>
    <div class="list-grid" id="recipe-grid"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="detail-view" id="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title-wrap">
      <div class="detail-name" id="d-name"></div>
      <div class="detail-source" id="d-source"></div>
    </div>
  </div>
  <div class="detail-scroll" id="detail-scroll">
    <div class="scale-card">
      <div class="scale-label">Escalar receta</div>
      <div class="scale-row">
        <div class="qty-controls">
          <button class="qty-btn" ontouchstart="" onclick="changeQty(-1)">−</button>
          <input class="qty-input" id="qty-input" type="number" value="1" min="0.1" step="0.1" oninput="recalc()">
          <button class="qty-btn" ontouchstart="" onclick="changeQty(1)">+</button>
        </div>
        <div class="unit-tabs" id="unit-tabs"></div>
      </div>
    </div>
    <div class="metrics-row">
      <div class="metric-box">
        <div class="metric-label">Factor</div>
        <div class="metric-val" id="m-factor">1.00×</div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Rendimiento</div>
        <div class="metric-val" id="m-rend">—</div>
        <div class="metric-sub" id="m-rend-sub"></div>
      </div>
      <div class="metric-box">
        <div class="metric-label">Ingredientes</div>
        <div class="metric-val" id="m-ing">—</div>
      </div>
    </div>
    <div class="ing-card">
      <div class="ing-header">
        <span>Ingrediente</span>
        <span>Base → Escalado</span>
      </div>
      <div id="ing-list"></div>
    </div>
  </div>
</div>

const SOURCES = [...new Set(RECIPES.map(r=>r.source))].sort();
let filtered = [...RECIPES];
let activeSource = '';
let activeRecipe = null;
let activeUnit = 'UND';

// Init source chips
const chipsEl = document.getElementById('filter-chips');
SOURCES.forEach(s=>{
  const c = document.createElement('button');
  c.className = 'filter-chip';
  c.textContent = s;
  c.onclick = ()=>toggleSource(s, c);
  chipsEl.appendChild(c);
});

document.getElementById('hdr-count').textContent = RECIPES.length + ' recetas';

function toggleFilter(){
  const d = document.getElementById('filter-drawer');
  const b = document.getElementById('filter-toggle-btn');
  d.classList.toggle('open');
  b.classList.toggle('active');
}

function toggleSource(src, el){
  activeSource = activeSource === src ? '' : src;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  if(activeSource) el.classList.add('active');
  filterRecipes();
}

function filterRecipes(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = RECIPES.filter(r=>{
    const matchSrc = !activeSource || r.source === activeSource;
    if(!q) return matchSrc;
    return matchSrc && (r.name.toLowerCase().includes(q) || r.ingredients.some(i=>i.name.toLowerCase().includes(q)));
  });
  renderList();
}

function renderList(){
  const grid = document.getElementById('recipe-grid');
  const bar = document.getElementById('results-bar');
  bar.textContent = filtered.length + ' recetas';
  if(!filtered.length){
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🔍</div><div>Sin resultados</div></div>';
    return;
  }
  grid.innerHTML = filtered.map((r,i)=>{
    const idx = RECIPES.indexOf(r);
    return `<div class="recipe-card" onclick="showDetail(${idx})">
      <div class="recipe-card-name">${r.name}</div>
      <span class="recipe-card-tag">${r.source}</span>
      <div class="recipe-card-meta">Rend: ${r.rendimiento_cant} ${r.rendimiento_udm}<br>${r.ingredients.length} ingredientes</div>
    </div>`;
  }).join('');
}

function showDetail(idx){
  activeRecipe = RECIPES[idx];
  activeUnit = 'UND';
  document.getElementById('d-name').textContent = activeRecipe.name;
  document.getElementById('d-source').textContent = activeRecipe.source + ' · ' + activeRecipe.sheet;
  document.getElementById('qty-input').value = 1;
  document.getElementById('m-ing').textContent = activeRecipe.ingredients.length;

  // Unit tabs
  const isWeight = !['UND','und'].includes(activeRecipe.rendimiento_udm);
  const tabs = document.getElementById('unit-tabs');
  tabs.innerHTML = '';
  const units = isWeight ? ['UND','LB','KG'] : ['UND'];
  units.forEach(u=>{
    const btn = document.createElement('button');
    btn.className = 'unit-tab' + (u==='UND'?' active':'');
    btn.textContent = u==='UND'?'Unidades':u==='LB'?'Libras':'Kilos';
    btn.onclick = ()=>{ activeUnit=u; tabs.querySelectorAll('.unit-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); recalc(); };
    tabs.appendChild(btn);
  });

  document.getElementById('detail-view').classList.add('open');
  document.getElementById('detail-scroll').scrollTop = 0;
  recalc();
}

function closeDetail(){
  document.getElementById('detail-view').classList.remove('open');
}

function changeQty(delta){
  const inp = document.getElementById('qty-input');
  let v = parseFloat(inp.value)||1;
  v = Math.max(0.1, Math.round((v+delta)*10)/10);
  inp.value = v;
  recalc();
}

function recalc(){
  const r = activeRecipe;
  if(!r) return;
  const qty = parseFloat(document.getElementById('qty-input').value)||1;
  const rendGr = r.rendimiento_udm==='GR'||r.rendimiento_udm==='ML' ? r.rendimiento_cant :
                 r.rendimiento_udm==='KG' ? r.rendimiento_cant*1000 :
                 r.rendimiento_udm==='LITRO'||r.rendimiento_udm==='LITROS' ? r.rendimiento_cant*1000 : r.rendimiento_cant;
  
  let factor;
  if(activeUnit==='UND'){ factor = qty; }
  else if(activeUnit==='LB'){ factor = (qty*453.592)/rendGr; }
  else if(activeUnit==='KG'){ factor = (qty*1000)/rendGr; }

  document.getElementById('m-factor').textContent = factor.toFixed(3)+'×';
  const rendScaled = r.rendimiento_cant * factor;
  document.getElementById('m-rend').textContent = fmtNum(rendScaled);
  document.getElementById('m-rend-sub').textContent = r.rendimiento_udm;

  document.getElementById('ing-list').innerHTML = r.ingredients.map(ing=>{
    const sc = ing.cant * factor;
    const isGr = ing.udm==='GR'||ing.udm==='ML';
    const lb = isGr ? (sc/453.592) : null;
    return `<div class="ing-row">
      <div class="ing-name">${ing.name}</div>
      <div class="ing-amounts">
        <div class="ing-base">${fmtNum(ing.cant)} ${ing.udm}</div>
        <div class="ing-scaled">${fmtNum(sc)} ${ing.udm}</div>
        ${lb!==null?`<div class="ing-lb">${lb.toFixed(3)} lb</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function fmtNum(n){
  if(n<0.001) return n.toFixed(4);
  if(n<1) return n.toFixed(3);
  if(n<10) return n.toFixed(2);
  if(n<1000) return Math.round(n*10)/10+'';
  return Math.round(n).toLocaleString();
}

// Swipe to close
let touchStartX = 0;
document.getElementById('detail-view').addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; },{passive:true});
document.getElementById('detail-view').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientX - touchStartX > 80) closeDetail();
},{passive:true});

renderList();
</script>
