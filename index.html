<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C4656">
<title>Recetario GCG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
--bg:#f0f5f7;--surface:#fff;--surface2:#e8f0f4;
--accent:#1C4656;--accent2:#007B82;--accent-light:#CEDFE7;
--text:#1C4656;--text2:#3a6070;--text3:#7a9aaa;
--border:#c0d5de;--r:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:sans-serif;overflow:hidden}
#login-view{position:fixed;inset:0;background:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:24px}
#login-view.hidden{display:none}
.login-logo{margin-bottom:32px;text-align:center}
.login-logo h1{color:#fff;font-size:22px;font-weight:700}
.login-logo p{color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-card h2{font-size:16px;color:var(--text);margin-bottom:20px;font-weight:600}
.inp-group{margin-bottom:16px}
.inp-group label{display:block;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.inp-group input{width:100%;height:48px;border:1.5px solid var(--border);border-radius:12px;padding:0 16px;font-size:16px;color:var(--text);outline:none;background:var(--bg);-webkit-appearance:none}
.inp-group input:focus{border-color:var(--accent2);background:#fff}
.login-btn{width:100%;height:50px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:active{opacity:.85}
.login-error{color:#e53e3e;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
#list-view{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto}
.hdr{background:var(--accent);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{display:flex;align-items:center;gap:8px;flex:1}
.hdr-title{color:#fff;font-size:18px;font-weight:700}
.hdr-user{color:rgba(255,255,255,0.75);font-size:12px;white-space:nowrap;cursor:pointer}
.search-bar{background:var(--accent);padding:0 14px 12px;display:flex;gap:8px;flex-shrink:0}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;height:40px;padding:0 12px 0 36px;border:none;border-radius:20px;font-size:15px;background:rgba(255,255,255,0.15);color:#fff;outline:none;-webkit-appearance:none}
.search-wrap input::placeholder{color:rgba(255,255,255,0.55)}
.search-wrap input:focus{background:rgba(255,255,255,0.22)}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.7);font-size:15px;pointer-events:none}
.src-btn{height:40px;padding:0 14px;border:1.5px solid rgba(255,255,255,0.35);border-radius:20px;background:transparent;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.src-btn.on{background:var(--accent2);border-color:var(--accent2)}
.filter-drawer{background:var(--surface);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease;flex-shrink:0}
.filter-drawer.open{max-height:180px}
.chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;overflow-y:auto;max-height:180px}
.chip{padding:5px 12px;border-radius:18px;font-size:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
.chip.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}
.res-bar{font-size:12px;color:var(--text3);padding:2px 2px 8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(min-width:580px){.grid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:800px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:13px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.card:active{transform:scale(0.97)}
.card:hover{box-shadow:0 2px 12px rgba(28,70,86,0.12)}
.card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:5px}
.card-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(0,123,130,0.1);color:var(--accent2);margin-bottom:4px}
.card-meta{font-size:11px;color:var(--text3)}
.empty{text-align:center;padding:50px 20px;color:var(--text3);grid-column:1/-1}
#detail-view{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);max-width:900px;margin:0 auto;left:0;right:0}
#detail-view.open{transform:translateX(0)}
.d-hdr{background:var(--accent);padding:14px 16px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.back{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back:active{background:rgba(255,255,255,0.25)}
.d-title{color:#fff;font-size:15px;font-weight:700;line-height:1.35}
.d-src{color:rgba(255,255,255,0.72);font-size:12px;margin-top:2px}
.d-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.scale-box{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.box-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
.qty-ctrl{display:flex;align-items:center;background:var(--surface2);border-radius:21px;border:1.5px solid var(--border);overflow:hidden}
.qty-btn{width:42px;height:42px;border:none;background:transparent;color:var(--accent2);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-inp{width:64px;height:42px;border:none;background:transparent;text-align:center;font-size:17px;font-weight:700;color:var(--text);outline:none;-webkit-appearance:none}
.unit-row{display:flex;gap:6px;flex-wrap:wrap}
.utab{padding:8px 13px;border-radius:19px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s}
.utab.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--surface);border-radius:11px;padding:11px;border:1px solid var(--border);text-align:center}
.metric-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.metric-val{font-size:16px;font-weight:700;color:var(--accent);line-height:1.2}
.metric-sub{font-size:10px;color:var(--text3)}
.ing-box{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.ing-hdr{padding:10px 14px;background:var(--accent-light);border-bottom:1px solid var(--border);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.7px;display:flex;justify-content:space-between;font-weight:600}
.ing-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-row:nth-child(even){background:#f5f9fb}
.ing-name{flex:1;font-size:13px;color:var(--text);padding-right:8px;line-height:1.3}
.ing-right{text-align:right;flex-shrink:0}
.ing-base{font-size:11px;color:var(--text3)}
.ing-scaled{font-size:14px;font-weight:700;color:var(--accent2)}
.ing-lb{font-size:10px;color:var(--text3)}
.metodo-box{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-top:12px}
.metodo-hdr{padding:10px 14px;background:var(--accent-light);border-bottom:1px solid var(--border);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.metodo-step{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:flex-start}
.metodo-step:last-child{border-bottom:none}
.step-num{background:var(--accent2);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.55;flex:1}
#admin-view{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
#admin-view.open{transform:translateY(0)}
.admin-hdr{background:var(--accent);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.admin-hdr h2{color:#fff;font-size:17px;font-weight:700;flex:1}
.admin-close{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.admin-body{flex:1;overflow-y:auto;padding:14px}
.admin-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.admin-filter-btn{padding:7px 14px;border-radius:18px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer}
.admin-filter-btn.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.log-table{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.log-row{display:flex;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.log-row:last-child{border-bottom:none}
.log-row:nth-child(even){background:#f5f9fb}
.log-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-name{font-size:13px;font-weight:600;color:var(--text)}
.log-recipe{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:11px;color:var(--text3);flex-shrink:0;text-align:right}
.log-empty{padding:40px;text-align:center;color:var(--text3);font-size:14px}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:var(--accent2)}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

heet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ BASMATI","cant":60.0,"udm":"GR"},{"name":"AGUA","cant":140.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":3.0,"udm":"GR"},{"name":"COMINO EN POLVO","cant":0.5,"udm":"GR"},{"name":"SAL","cant":1.5,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati hasta que el agua salga clara.\n2. En una olla, calentar el aceite y tostar suavemente el comino molido.\n3. Agregar el arroz y sofreír 1 minuto junto al comino.\n4. Incorporar el agua y la sal.\n5. Cocinar a fuego bajo, tapado, hasta que el agua se absorba completamente.\n6. Enfriar de acuerdo con estándares HACCP."},{"name":"MALAI PALAK","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"ESPINACA FRESCA","cant":70.0,"udm":"GR"},{"name":"TOMATE","cant":6.0,"udm":"GR"},{"name":"CHILE VERDE","cant":0.5,"udm":"GR"},{"name":"LECHE DE COCO","cant":12.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"},{"name":"GARAM MASALA","cant":0.5,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":0.25,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.25,"udm":"GR"},{"name":"SAL","cant":1.0,"udm":"GR"}],"metodo":"1. Lavar y blanquear la espinaca en agua hirviendo 1-2 minutos. Escurrir y licuar hasta obtener un puré fino.\n2. En sartén, calentar aceite y sofreír chile verde hasta dorar.\n3. Agregar tomate picado y cocinar hasta formar una pasta.\n4. Añadir las especias: garam masala, cúrcuma, comino y sal.\n5. Incorporar el puré de espinaca y cocinar 3-4 minutos.\n6. Agregar la leche de coco, mezclar bien y cocinar 2 minutos más.\n7. Rectificar sazón y servir caliente."},{"name":"KHEER DE COCO Y MANGO","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"LECHE DE COCO","cant":40.0,"udm":"GR"},{"name":"ARROZ BASMATI","cant":20.0,"udm":"GR"},{"name":"MANGO CORTADO EN CUBOS PEQUEÑOS","cant":25.0,"udm":"GR"},{"name":"AZÚCAR","cant":8.0,"udm":"GR"},{"name":"CARDAMOMO MOLIDO","cant":0.3,"udm":"GR"},{"name":"SEMILLAS DE CALABAZA TOSTADA","cant":3.0,"udm":"GR"},{"name":"COCO RALLADO","cant":3.0,"udm":"GR"},{"name":"SAL","cant":0.2,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati y cocinarlo en agua hasta que esté tierno y el líquido reducido.\n2. Añadir la leche de coco y el azúcar, cocinando a fuego bajo hasta obtener una textura cremosa.\n3. Incorporar cardamomo y una pizca de sal, removiendo constantemente.\n4. Retirar del fuego, enfriar.\n5. Servir en porciones individuales, decorando con cubos de mango y semillas de calabaza tostada picada y coco rallado."},{"name":"MEDU WADA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":75,"rendimiento_udm":"GR","ingredients":[{"name":"LENTEJAS","cant":40.0,"udm":"GR"},{"name":"AGUA","cant":120.0,"udm":"GR"},{"name":"CHILE VERDE FINAMENTE PICADO","cant":1.0,"udm":"GR"},{"name":"HOJAS DE LAUREL","cant":0.7,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.5,"udm":"GR"},{"name":"SAL","cant":0.7,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":20.0,"udm":"GR"}],"metodo":"1. Lavar las lentejas y remojarlas en agua durante 4 horas. Escurrir bien.\n2. Moler las lentejas con muy poca agua hasta obtener una pasta espesa y ligera.\n3. Incorporar chile verde, hojas de laurel, comino y sal, mezclando suavemente para airear la masa.\n4. Humedecer las manos, formar aros (donas) de aprox. 30 g cada uno.\n5. Freír en aceite caliente (170–175 °C) hasta que estén dorados y crujientes.\n6. Enfriar de acuerdo con estándares HACCP."},{"name":"SAMBAR","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"LENTEJA ROJA","cant":25.0,"udm":"GR"},{"name":"TOMATE EN CUBOS","cant":10.0,"udm":"GR"},{"name":"TAMARINDO PASTA","cant":5.0,"udm":"GR"},{"name":"CILANTRO SECO","cant":2.0,"udm":"GR"},{"name":"COMINO EN POLVO","cant":1.0,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":1.0,"udm":"GR"},{"name":"CHILE SECO","cant":1.0,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.5,"udm":"GR"},{"name":"HOJAS DE LAUREL","cant":0.3,"udm":"GR"},{"name":"RALLADURA DE LIMÓN","cant":0.2,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":0.3,"udm":"GR"},{"name":"SAL","cant":0.7,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"}],"metodo":"1. Lavar las lentejas rojas y cocinarlas en agua con cúrcuma hasta que estén suaves. Reservar.\n2. En una sartén, calentar aceite y añadir comino, chile seco y laurel con ralladura de limón.\n3. Agregar el tomate y sofreir, cocinar brevemente.\n4. Añadir la pasta de tamarindo y la mezcla casera de especias, mezclando bien.\n5. Incorporar las lentejas cocidas con parte de su líquido, ajustar consistencia con agua según se requiera.\n6. Cocinar a fuego medio hasta integrar sabores, rectificar de sal."},{"name":"UPMA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"SÉMOLA","cant":50.0,"udm":"GR"},{"name":"GUISANTES","cant":10.0,"udm":"GR"},{"name":"CHILE VERDE FRESCO","cant":1.0,"udm":"GR"},{"name":"HOJAS DE LAUREL","cant":0.3,"udm":"GR"},{"name":"MOSTAZA EN POLVO","cant":0.5,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":6.0,"udm":"GR"},{"name":"SAL","cant":1.0,"udm":"GR"},{"name":"AGUA CALIENTE","cant":45.0,"udm":"GR"}],"metodo":"1. Tostar la sémola en sartén seca a fuego medio hasta dorar ligeramente y reservar.\n2. En la misma sartén calentar aceite, añadir mostaza en polvo.\n3. Incorporar hojas de laurel y chile verde picado, saltear unos segundos.\n4. Agregar guisantes, rehogar 2–3 minutos.\n5. Verter el agua caliente y la sal; cuando hierva, añadir la sémola poco a poco mezclando constantemente.\n6. Cocinar a fuego bajo hasta que el agua se absorba y la textura sea suave y húmeda."},{"name":"CHANA MASALA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":120,"rendimiento_udm":"GR","ingredients":[{"name":"GARBANZOS COCIDOS","cant":70.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":18.0,"udm":"GR"},{"name":"TOMATE","cant":18.0,"udm":"GR"},{"name":"AJO FRESCO","cant":2.5,"udm":"GR"},{"name":"JENGIBRE FRESCO","cant":2.5,"udm":"GR"},{"name":"CHILE VERDE","cant":1.5,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":5.0,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":0.4,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.6,"udm":"GR"},{"name":"CILANTRO","cant":0.6,"udm":"GR"},{"name":"GARAM MASALA","cant":0.6,"udm":"GR"},{"name":"SAL","cant":1.2,"udm":"GR"},{"name":"AGUA","cant":20.0,"udm":"GR"}],"metodo":"1. Calentar el aceite en una sartén y sofreír la cebolla hasta dorar.\n2. Añadir ajo, jengibre y chile verde picados; rehogar 1–2 minutos.\n3. Incorporar tomate en cubos y cocinar hasta formar una pasta espesa.\n4. Agregar cúrcuma, comino, cilantro molido y sal; mezclar bien.\n5. Añadir los garbanzos cocidos y el agua; dejar hervir a fuego medio 8–10 minutos.\n6. Incorporar el garam masala, ajustar la sazón y retirar del fuego.\n7. Servir caliente, opcionalmente decorado con hojas de cilantro fresco."},{"name":"ARROZ PILAF AL CARDAMOMO","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ BASMATI","cant":70.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":10.0,"udm":"GR"},{"name":"AJO FRESCO","cant":1.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":5.0,"udm":"GR"},{"name":"CARDAMOMO","cant":0.3,"udm":"GR"},{"name":"CANELA EN RAMA","cant":0.2,"udm":"GR"},{"name":"CLAVO DE OLOR","cant":0.2,"udm":"GR"},{"name":"CALDO DE VEGETALES","cant":30.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati hasta que el agua salga clara y escurrir.\n2. Calentar el aceite en una sartén amplia.\n3. Añadir cardamomo, canela y clavo; sofreír unos segundos para liberar aromas.\n4. Incorporar la cebolla y el ajo picados; rehogar hasta dorar ligeramente.\n5. Agregar el arroz y sofreír 2–3 minutos para nacarar los granos.\n6. Verter el caldo caliente con la sal, remover suavemente y tapar.\n7. Cocinar a fuego bajo hasta que el líquido se absorba por completo.\n8. Dejar enfriar de acuerdo con estándares HACCP."},{"name":"CALDO DE VEGETALES","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"ZANAHORIA","cant":20.0,"udm":"GR"},{"name":"APIO","cant":15.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":15.0,"udm":"GR"},{"name":"PUERRO","cant":10.0,"udm":"GR"},{"name":"TOMATE","cant":10.0,"udm":"GR"},{"name":"CHILE VERDE","cant":10.0,"udm":"GR"},{"name":"DIENTE DE AJO","cant":2.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":1.0,"udm":"GR"},{"name":"AGUA","cant":150.0,"udm":"GR"},{"name":"PEREJIL FRESCO","cant":2.0,"udm":"GR"},{"name":"HOJA DE LAUREL","cant":0.2,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar, pelar y cortar los vegetales en trozos medianos.\n2. Rehogar cebolla, apio, puerro, zanahoria y pimiento en aceite vegetal por 3 min.\n3. Añadir el resto de vegetales, hierbas y agua.\n4. Cocinar a fuego bajo durante 45–60 minutos, espumando las impurezas.\n5. Colar y enfriar de acuerdo con estándares HACCP."},{"name":"VERDURAS AL CURRY SUAVE","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"COLIFLOR","cant":24.0,"udm":"GR"},{"name":"CALABAZA","cant":24.0,"udm":"GR"},{"name":"CALABACÍN","cant":24.0,"udm":"GR"},{"name":"BRÓCOLI","cant":24.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":1.0,"udm":"GR"},{"name":"LECHE DE COCO","cant":15.0,"udm":"GR"},{"name":"TOMATE MEDIANO","cant":5.0,"udm":"GR"},{"name":"CURRY EN POLVO","cant":2.0,"udm":"GR"},{"name":"CÚRCUMA","cant":0.5,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati hasta que el agua salga clara y escurrir.\n2. Calentar el aceite en una sartén amplia.\n3. Añadir cardamomo, canela y clavo; sofreír unos segundos para liberar aromas.\n4. Incorporar la cebolla y el ajo picados; rehogar hasta dorar ligeramente.\n5. Agregar el arroz y sofreír 2–3 minutos para nacarar los granos.\n6. Verter el caldo caliente con la sal, remover suavemente y tapar.\n7. Cocinar a fuego bajo hasta que el líquido se absorba por completo.\n8. Dejar enfriar de acuerdo con estándares HACCP."},{"name":"GULAB JAMUN","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"HARINA DE TRIGO","cant":15.0,"udm":"GR"},{"name":"HARINA DE ALMENDRA (opcional)","cant":5.0,"udm":"GR"},{"name":"POLVO DE HORNEAR","cant":0.5,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":3.0,"udm":"GR"},{"name":"LECHE DE COCO","cant":20.0,"udm":"GR"},{"name":"AZÚCAR","cant":30.0,"udm":"GR"},{"name":"AGUA","cant":35.0,"udm":"GR"},{"name":"CARDAMOMO MOLIDO","cant":0.3,"udm":"GR"},{"name":"RALLADURA DE LIMÓN","cant":0.2,"udm":"GR"},{"name":"ACEITE VEGETAL (para freír)","cant":20.0,"udm":"GR"}],"metodo":"1. Mezclar harinas y polvo de hornear.\n2. Incorporar aceite y leche de coco hasta lograr una masa suave.\n3. Formar bolitas de 8–10 g.\n4. Freír lentamente en aceite vegetal hasta dorar.\n5. Preparar jarabe con agua, azúcar, cardamomo y ralladura de limón; hervir 5 min.\n6. Sumergir las bolitas fritas en jarabe tibio por 30 min mínimo.\n7. Enfriar de cuerdo con estándares HACCP."},{"name":"ALMENDRA EN LASCAS TOSTADA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":1,"rendimiento_udm":"GR","ingredients":[{"name":"Almendra en lascas","cant":1.2,"udm":"GR"}],"metodo":"1. Mezclar harinas y polvo de hornear.\n2. Incorporar aceite y leche de coco hasta lograr una masa suave.\n3. Formar bolitas de 8–10 g.\n4. Freír lentamente en aceite vegetal hasta dorar.\n5. Preparar jarabe con agua, azúcar, cardamomo y ralladura de limón; hervir 5 min.\n6. Sumergir las bolitas fritas en jarabe tibio por 30 min mínimo.\n7. Enfriar de cuerdo con estándares HACCP."},{"name":"IDLI","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":75,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ GRANO MEDIO","cant":40.0,"udm":"GR"},{"name":"LENTEJAS","cant":20.0,"udm":"GR"},{"name":"AGUA","cant":60.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar bien el arroz y las lentejas por separado. Dejar en remojo en agua limpia por 6 horas.\n2. Moler cada uno hasta obtener pastas suaves, luego mezclar.\n3. Dejar fermentar la mezcla tapada entre 8–12 horas a temperatura ambiente, hasta que aumente de volumen y se formen burbujas.\n4. Añadir sal y mezclar suavemente.\n5. Engrasar moldes de idli y verter la mezcla (aprox. 20 g por pieza).\n6. Cocinar al vapor durante 10–12 minutos, hasta que estén firmes y esponjosos.\n7. Retirar del molde y enfriar de acuerdo con estándares HACCP."},{"name":"CHUTNEY DE TOMATE","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":30,"rendimiento_udm":"GR","ingredients":[{"name":"TOMATE MEDIANO","cant":50.0,"udm":"GR"},{"name":"CHILE ROJO EN ESCAMAS","cant":0.5,"udm":"GR"},{"name":"MOSTAZA EN POLVO","cant":0.3,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"AZÚCAR","cant":0.5,"udm":"GR"}],"metodo":"1. Calentar el aceite y añadir mostaza en polvo.\n2. Incorporar el chile seco; sofreír 1 minuto.\n3. Agregar el tomate picado, sal y azúcar. Cocinar a fuego medio hasta que se reduzca y espese.\n4. Triturar en batidora o licuadora hasta obtener textura suave.\n5. Rectificar sazón y enfriar."},{"name":"PONGAL","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":60,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ BLANCO","cant":25.0,"udm":"GR"},{"name":"LENTEJA","cant":15.0,"udm":"GR"},{"name":"AGUA","cant":90.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"},{"name":"COMINO EN POLVO","cant":0.2,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.2,"udm":"GR"},{"name":"SEMILLAS DE MARAÑON TOSTADAS","cant":2.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar el arroz y la lenteja. Lenteja , se recomienda remojar 1–2 h.\n2. Cocinar arroz y lenteja juntos con agua y sal hasta obtener textura cremosa.\n3. En una sartén, calentar aceite vegetal.\n4. Añadir comino, pimienta y semillas de marañón; sofreír brevemente.\n5. Incorporar este sofrito al arroz-lenteja cocido y mezclar bien.\n6. Refrigerar de acuerdo con estándares HACCP."},{"name":"PARATHA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":28,"rendimiento_udm":"GR","ingredients":[{"name":"HARINA SEMIFUERTE","cant":20.0,"udm":"GR"},{"name":"AGUA","cant":10.0,"udm":"GR"},{"name":"ACEITE VEGETAL (para la masa)","cant":1.0,"udm":"GR"},{"name":"SAL","cant":0.2,"udm":"GR"},{"name":"ACEITE VEGETAL (para cocción)","cant":1.0,"udm":"GR"}],"metodo":"1. Mezclar harina, sal y aceite. Incorporar poco a poco el agua hasta formar una masa suave.\n2. Reposar 15 minutos cubierta con paño húmedo.\n3. Formar una bolita (32–33 g) y estirar con rodillo en forma circular.\n4. Cocinar en plancha caliente con un poco de aceite, dorando por ambos lados hasta que aparezcan manchas doradas.\n5. Retirar y enfriar de acuerdo con estándares HACCP."},{"name":"BAINGAN BHARTA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":120,"rendimiento_udm":"GR","ingredients":[{"name":"BERENJENA ASADA Y PELADA","cant":70.0,"udm":"GR"},{"name":"TOMATE PICADO","cant":15.0,"udm":"GR"},{"name":"CHILE VERDE FRESCO PICADO","cant":10.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":6.0,"udm":"GR"},{"name":"COMINO EN POLVO","cant":1.0,"udm":"GR"},{"name":"CILANTRO FRESCO PICADO","cant":5.0,"udm":"GR"},{"name":"SAL","cant":2.0,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":0.5,"udm":"GR"},{"name":"GARAM MASALA","cant":0.5,"udm":"GR"}],"metodo":"1. Asar la berenjena directamente sobre la llama o en horno hasta que la piel se queme y la pulpa quede suave. Pelar y reservar la pulpa (70 g).\n2. Calentar el aceite vegetal (6 g) y añadir el comino en polvo (1 g) para que libere su aroma.\n3. Incorporar  chile verde. Sofreír .\n4. Agregar el tomate (15 g), cúrcuma (0.5 g) y sal (2 g). Cocinar hasta que se forme una salsa espesa.\n5. Mezclar la pulpa de berenjena asada, aplastándola ligeramente con la cuchara. Cocinar 5–6 minutos removiendo bien.\n6. Terminar con garam masala (0.5 g) y cilantro fresco (5 g). Mezclar y retirar del fuego.\n7. Enfriar de acuerdo con estandares HACCP."},{"name":"ARROZ JEERA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ BASMATI","cant":40.0,"udm":"GR"},{"name":"AGUA","cant":80.0,"udm":"GR"},{"name":"COMINO EN GRANO","cant":1.0,"udm":"GR"},{"name":"ACEITE VEGETAL O GHEE","cant":3.0,"udm":"GR"},{"name":"SAL","cant":1.0,"udm":"GR"},{"name":"CILANTRO FRESCO PICADO","cant":1.0,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati (40 g) bajo agua corriente hasta que salga clara, para retirar el exceso de almidón.\n2. En una cacerola pequeña, calentar el aceite o ghee (3 g) y agregar el comino en grano (1 g). Sofreír hasta que libere aroma y empiece a crepitar.\n3. Incorporar el arroz escurrido y saltear unos segundos, mezclando bien con el comino.\n4. Añadir el agua (80 g) y la sal (1 g). Llevar a ebullición, luego reducir a fuego bajo y tapar.\n5. Cocinar a fuego lento hasta que el arroz absorba el agua y quede suelto.\n6. Decorar con cilantro picado\n7. Enfriar de acuerdo con estandares HACCP."},{"name":"COLIFLOR Y BRÓCOLI SALTEADOS CON CÚRCUMA Y MOSTAZA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"COLIFLOR","cant":40.0,"udm":"GR"},{"name":"BRÓCOLI","cant":30.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":4.0,"udm":"GR"},{"name":"SEMILLAS DE MOSTAZA","cant":1.0,"udm":"GR"},{"name":"CÚRCUMA EN POLVO","cant":0.5,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Lavar y cortar en floretes pequeños la coliflor y el brócoli.\n2. Calentar el aceite vegetal en un sartén.\n3. Agregar la  mostaza en polvo y dejar que libere su aroma.\n4. Incorporar la coliflor y el brócoli, saltear a fuego medio durante 3–4 minutos.\n5. Añadir la cúrcuma en polvo y la sal. Mezclar bien para que los vegetales se impregnen de los sabores.\n6. Cocinar hasta que estén al dente, manteniendo su color y textura.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"HALWA DE PLATANO MADURO Y LECHE","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"PLÁTANO MADURO","cant":50.0,"udm":"GR"},{"name":"LECHE ENTERA","cant":40.0,"udm":"GR"},{"name":"AZÚCAR","cant":10.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":5.0,"udm":"GR"},{"name":"CARDAMOMO","cant":0.2,"udm":"GR"}],"metodo":"1. Pelar y cortar el plátano maduro en rodajas finas.\n2. En una sartén, calentar el aceite y saltear el plátano hasta que se dore y caramelice ligeramente.\n3. Incorporar la leche y cocinar a fuego bajo, removiendo constantemente, hasta que el plátano se deshaga y espese la mezcla.\n4. Agregar el azúcar y el cardamomo, continuar la cocción hasta obtener una textura cremosa.\n5. Retirar del fuego.\n6. Verificar rendimiento final de 80 GR.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"DOSA","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":60,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ PRECOCIDO","cant":25.0,"udm":"GR"},{"name":"LENTEJA","cant":10.0,"udm":"GR"},{"name":"AGUA","cant":30.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":1.0,"udm":"GR"}],"metodo":"1. Lavar bien el arroz y el urad dal, dejar en remojo por separado durante 4–6 horas.\n2. Escurrir y moler ambos ingredientes con agua hasta obtener una pasta suave.\n3. Mezclar las masas y dejar fermentar en lugar cálido entre 8–12 horas hasta que duplique volumen.\n4. Añadir la sal y mezclar suavemente.\n5. Calentar una sartén antiadherente, engrasar ligeramente con aceite.\n6. Verter un cucharón de la mezcla y extender en forma de disco fino.\n7. Cocinar hasta que los bordes estén dorados y la dosa se despegue sola.\n8. Verificar rendimiento final de 60 GR.\n9. Enfriar de acuerdo con estándares HACCP."},{"name":"CURRY DE CALABAZA Y GUISANTES","sheet":"UA AVML/HNML/VJML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"CALABAZA","cant":40.0,"udm":"GR"},{"name":"GUISANTES","cant":20.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":8.0,"udm":"GR"},{"name":"TOMATE FRESCO","cant":6.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":3.0,"udm":"GR"},{"name":"LECHE DE COCO","cant":6.0,"udm":"GR"},{"name":"CURRY EN POLVO","cant":1.0,"udm":"GR"},{"name":"CÚRCUMA","cant":0.3,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"AGUA","cant":20.0,"udm":"GR"}],"metodo":"1. Lavar y cortar la calabaza en cubos pequeños.\n2. Picar finamente la cebolla y el tomate.\n3. Calentar el aceite en una sartén y sofreír la cebolla hasta que esté transparente.\n4. Añadir el tomate, la cúrcuma y el curry en polvo, cocinar 2 minutos hasta formar una base de especias.\n5. Incorporar la calabaza y los guisantes, mezclar bien.\n6. Agregar el agua y cocinar a fuego medio hasta que la calabaza esté tierna.\n7. Verter la leche de coco y ajustar con sal, cocinar 2 minutos más hasta integrar.\n8. Verificar rendimiento final de 80 GR.\n9. Enfriar de acuerdo con estándares HACCP."},{"name":"FALAFEL","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":90,"rendimiento_udm":"GR","ingredients":[{"name":"GARBANZOS SECOS","cant":50.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":10.0,"udm":"GR"},{"name":"AJO FRESCO","cant":2.0,"udm":"GR"},{"name":"PEREJIL FRESCO","cant":5.0,"udm":"GR"},{"name":"CILANTRO FRESCO","cant":5.0,"udm":"GR"},{"name":"HARINA DE GARBANZO","cant":5.0,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.5,"udm":"GR"},{"name":"CILANTRO MOLIDO","cant":0.5,"udm":"GR"},{"name":"POLVO DE HORNEAR","cant":0.25,"udm":"GR"},{"name":"SAL","cant":1.0,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.25,"udm":"GR"},{"name":"ACEITE VEGETAL (FREÍR)","cant":11.5,"udm":"GR"}],"metodo":"1. Remojar los garbanzos por 12 horas y escurrir bien.\n2. Procesar garbanzos con cebolla, ajo, perejil y cilantro hasta obtener una pasta gruesa.\n3. Añadir harina de garbanzo, comino, cilantro molido, sal, pimienta y polvo de hornear. Mezclar bien.\n4. Formar bolitas o discos pequeños con la mezcla.\n5. Freír en aceite caliente (170-180°C) hasta que estén dorados y crujientes."},{"name":"HARINA DE GARBANZO","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":45,"rendimiento_udm":"GR","ingredients":[{"name":"GARBANZOS SECOS","cant":50.0,"udm":"GR"}],"metodo":"1. Moler garbanzo seco hasta transformarlo en polvo para asemejar harina de garbanzo."},{"name":"ARROZ BASMATI","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"ARROZ BASMATI","cant":60.0,"udm":"GR"},{"name":"AGUA","cant":140.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":3.0,"udm":"GR"},{"name":"SAL","cant":1.5,"udm":"GR"}],"metodo":"1. Lavar el arroz basmati hasta que el agua salga clara.\n2. Agregar el arroz y sofreír 1 minuto junto al comino.\n3. Incorporar el agua y la sal.\n4. Cocinar a fuego bajo, tapado, hasta que el agua se absorba completamente.\n5. Enfriar de acuerdo con estándares HACCP."},{"name":"SALSA SHAKSHUKA","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":50,"rendimiento_udm":"GR","ingredients":[{"name":"TOMATE MEDIANO","cant":55.0,"udm":"GR"},{"name":"CHILE ROJO","cant":5.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":5.0,"udm":"GR"},{"name":"AJO FRESCO","cant":1.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":3.0,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.25,"udm":"GR"},{"name":"PAPRIKA","cant":0.25,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.25,"udm":"GR"},{"name":"CILANTRO FRESCO","cant":1.0,"udm":"GR"}],"metodo":"1. Calentar el aceite en una sartén y sofreír la cebolla, ajo y chile rojo hasta ablandar.\n2. Agregar el tomate triturado y cocinar a fuego medio.\n3. Incorporar comino, paprika, sal y pimienta, mezclar bien.\n4. Cocinar 10 minutos a fuego bajo hasta que la salsa espese.\n5. Finalizar con cilantro fresco picado y ajustar sazón."},{"name":"ZANAHORIAS GLASEADAS","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":40,"rendimiento_udm":"GR","ingredients":[{"name":"ZANAHORIA FRESCA","cant":50.0,"udm":"GR"},{"name":"ACEITE DE OLIVA","cant":3.0,"udm":"GR"},{"name":"AZÚCAR","cant":5.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.25,"udm":"GR"},{"name":"AGUA","cant":60.0,"udm":"GR"}],"metodo":"1. Pelar y cortar la zanahoria en bastones delgados y regulares.\n2. Colocar en sartén con aceite de oliva, azúcar y luego agregar agua.\n3. Cocinar a fuego medio hasta que el líquido reduzca y forme un glaseado.\n4. Sazonar con sal y pimienta.\n5. Servir calientes como guarnición."},{"name":"MOUSSE DE FRUTAS TROPICALES EN LECHE DE COCO","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"LECHE DE COCO","cant":30.0,"udm":"GR"},{"name":"MANGO","cant":30.0,"udm":"GR"},{"name":"PIÑA","cant":15.0,"udm":"GR"},{"name":"PAPAYA","cant":13.0,"udm":"GR"},{"name":"AZÚCAR","cant":7.0,"udm":"GR"},{"name":"GELATINA SIN SABOR HIDRATADA","cant":1.5,"udm":"GR"},{"name":"BASE TOPPING DE VAINILLA","cant":10.0,"udm":"GR"},{"name":"COCO RALLADO TOSTADO (decoración)","cant":1.5,"udm":"GR"}],"metodo":"1. Triturar la pulpa de frutas tropicales hasta obtener un puré fino.\n2. Calentar suavemente la leche de coco con el azúcar hasta disolverlo.\n3. Incorporar la gelatina hidratada y remover hasta que quede completamente disuelta.\n4. Añadir el puré de frutas a la mezcla de leche de coco y dejar entibiar.\n5. Incorporar suavemente la base topping de vainilla batida, con movimientos envolventes, para dar aireado al mousse.\n6. Verter en molde y refrigerar.\n7. Decorar con coco rallado tostado antes de servir."},{"name":"BERENJENA AL HORNO CON ESPECIAS","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":150,"rendimiento_udm":"GR","ingredients":[{"name":"BERENJENA","cant":190.0,"udm":"GR"},{"name":"ACEITE DE OLIVA","cant":6.0,"udm":"GR"},{"name":"AJO FRESCO","cant":4.0,"udm":"GR"},{"name":"COMINO MOLIDO","cant":1.0,"udm":"GR"},{"name":"PAPRIKA","cant":1.0,"udm":"GR"},{"name":"CÚRCUMA","cant":0.5,"udm":"GR"},{"name":"PIMIENTA NEGRA","cant":0.5,"udm":"GR"},{"name":"SAL","cant":1.0,"udm":"GR"},{"name":"PEREJIL FRESCO","cant":4.0,"udm":"GR"}],"metodo":"1. Lavar y cortar la berenjena en cubos medianos.\n2. Mezclar en un bol el aceite de oliva, ajo picado, comino, pimentón, cúrcuma, pimienta y sal.\n3. Cubrir la berenjena con la mezcla de especias y disponer en una bandeja de horno.\n4. Hornear a 190°C durante 25-30 minutos, removiendo a mitad de cocción para que se dore de manera uniforme.\n5. Retirar del horno, espolvorear con perejil fresco picado y enfriar de acuerdo con estándares HACCP."},{"name":"CUSCUS CON HIERBAS FRESCAS Y LIMÓN","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"COUS COUS","cant":55.0,"udm":"GR"},{"name":"AGUA","cant":25.0,"udm":"GR"},{"name":"ACEITE DE OLIVA","cant":3.0,"udm":"GR"},{"name":"JUGO DE LIMÓN","cant":2.0,"udm":"GR"},{"name":"RALLADURA DE LIMÓN","cant":0.5,"udm":"GR"},{"name":"PEREJIL FRESCO","cant":2.0,"udm":"GR"},{"name":"CILANTRO FRESCO","cant":1.0,"udm":"GR"},{"name":"HIERBABUENA FRESCA","cant":1.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"}],"metodo":"1. Calentar el agua con una pizca de sal y el aceite de oliva.\n2. Añadir el cuscús al agua caliente, retirar del fuego y tapar 5 minutos.\n3. Soltar los granos con un tenedor para que quede suelto.\n4. Incorporar jugo y ralladura de limón.\n5. Añadir perejil, cilantro y hierbabuena finamente picados.\n6. Mezclar suavemente y servir a temperatura ambiente o ligeramente tibio."},{"name":"ZUCCHINI SALTEADO CON AJO Y PEREJIL","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":50,"rendimiento_udm":"GR","ingredients":[{"name":"ZUCCHINI","cant":62.0,"udm":"GR"},{"name":"ACEITE DE OLIVA","cant":2.0,"udm":"GR"},{"name":"AJO FRESCO","cant":0.9,"udm":"GR"},{"name":"PEREJIL FRESCO","cant":0.85,"udm":"GR"},{"name":"SAL","cant":0.3,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.2,"udm":"GR"}],"metodo":"1. Lavar y pelar el zucchini si es necesario. Cortar en rodajas o cubos medianos.\n2. Picar finamente el ajo y el perejil.\n3. Calentar aceite de oliva en sartén a fuego medio.\n4. Saltear el zucchini durante 4-5 minutos hasta que esté tierno pero firme.\n5. Añadir el ajo y continuar salteando 1 minuto más.\n6. Sazonar con sal y pimienta al gusto.\n7. Retirar del fuego y espolvorear con perejil fresco picado antes de servir.\n8. Enfriar de acuerdo con estándares HACCP."},{"name":"GELATINA NATURAL DE FRUTAS TROPICALES","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":90,"rendimiento_udm":"GR","ingredients":[{"name":"MARACUYÁ","cant":36.0,"udm":"GR"},{"name":"AZÚCAR","cant":8.0,"udm":"GR"},{"name":"AGAR-AGAR EN POLVO","cant":0.8,"udm":"GR"},{"name":"AGUA","cant":10.0,"udm":"GR"}],"metodo":"1. Extraer los jugos naturales (desglosados previamente).\n2. Disolver el agar-agar en 10 g de agua fría.\n3. Llevar el jugo con el azúcar a ebullición suave.\n4. Incorporar la mezcla de agar-agar y hervir al menos 2 minutos para activar el gelificante.\n5. Verter en moldes individuales y enfriar a temperatura ambiente.\n6. Llevar a refrigeración hasta que la gelatina cuaje firme."},{"name":"KIWI EN BRUNOISE","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":10,"rendimiento_udm":"GR","ingredients":[{"name":"KIWI","cant":15.0,"udm":"GR"}],"metodo":"1. Desinfectar y pelar kiwi.\n2. Cortar en brunoise (cubos de 0.5 cm x 0.5 cm.\n3. Mantener en refrigeración hasta su uso."},{"name":"PAPAYA EN BRUNOISE","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":10,"rendimiento_udm":"GR","ingredients":[{"name":"PAPAYA","cant":18.0,"udm":"GR"}],"metodo":"1. Desinfectar y pelar papaya.\n2. Cortar en brunoise (cubos de 0.5 cm x 0.5 cm.\n3. Mantener en refrigeración hasta su uso."},{"name":"FRITTATA DE VEGETALES","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":110,"rendimiento_udm":"GR","ingredients":[{"name":"HUEVO ENTERO","cant":60.0,"udm":"GR"},{"name":"LECHE DE ALMENDRAS","cant":10.0,"udm":"GR"},{"name":"ZUCCHINI","cant":20.0,"udm":"GR"},{"name":"ZANAHORIA","cant":15.0,"udm":"GR"},{"name":"CHILE ROJO","cant":15.0,"udm":"GR"},{"name":"CEBOLLA BLANCA","cant":10.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.2,"udm":"GR"}],"metodo":"1. Lavar y cortar los vegetales en cubos pequeños o juliana fina.\n2. Saltear los vegetales en sartén con el aceite hasta que estén ligeramente tiernos.\n3. Batir el huevo con la leche, añadir sal y pimienta.\n4. Incorporar los vegetales salteados a la mezcla de huevo.\n5. Verter en sartén antiadherente pequeña y cocinar a fuego medio-bajo con tapa hasta que cuaje.\n6. Enfriar de acuerdo con estándares HACCP."},{"name":"ZUCCHINI GRILLADO CON ESPECIAS","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":60,"rendimiento_udm":"GR","ingredients":[{"name":"ZUCCHINI","cant":90.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":2.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"PIMIENTA NEGRA MOLIDA","cant":0.2,"udm":"GR"},{"name":"OREGANO SECO","cant":0.2,"udm":"GR"},{"name":"COMINO MOLIDO","cant":0.1,"udm":"GR"}],"metodo":"1. Lavar y cortar el zucchini en rodajas de 1 cm.\n2. Sazonar con sal, pimienta y especias, mezclar con el aceite.\n3. Cocinar en plancha o parrilla caliente 2–3 minut a negra y orégano seco.\n3. Pincelar con aceite de oliva la superficie de los tomates.\n4. Colocar los tomates con el corte hacia abajo sobre una plancha o parrilla caliente.\n5. Grillar durante 2–3 minutos hasta que se marquen líneas doradas y la pulpa se ablande ligeramente.\n6. Verificar rendimiento final de 50 GR.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"COMPOTA DE MANZANA SIN AZUCAR","sheet":"UA VGML/VLML/NLML/GFML","source":"UA SPML","rendimiento_cant":90,"rendimiento_udm":"GR","ingredients":[{"name":"MANZANA VERDE","cant":130.0,"udm":"GR"},{"name":"AGUA","cant":15.0,"udm":"GR"},{"name":"CANELA EN RAMA","cant":0.2,"udm":"GR"}],"metodo":"1. Pelar, descorazonar y cortar la manzana en cubos pequeños y uniformes.\n2. Colocar la manzana en una olla pequeña con el agua y la rama de canela.\n3. Cocinar a fuego bajo durante 12–15 minutos, removiendo ocasionalmente, hasta que la manzana esté blanda.\n4. Retirar la rama de canela y triturar con espátula o batidor hasta obtener textura de compota.\n5. Verificar rendimiento final de 90 GR.\n6. Enfriar de acuerdo con estándares HACCP."},{"name":"PECHUGA DE POLLO GRILLADA","sheet":"UA DBML","source":"UA SPML","rendimiento_cant":100,"rendimiento_udm":"GR","ingredients":[{"name":"PECHUGA DE POLLO 4 OZ. VAC PAC","cant":100.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":10.0,"udm":"GR"}],"metodo":"1. Pincelar la pechuga de pollo VAC PAC con aceite vegetal.\n2. Marcar en la grilla por 1 lado.\n3. Enfriar de acuerdo con estándares HACCP."},{"name":"PECHUGA DE POLLO 4 OZ. VAC PAC","sheet":"UA DBML","source":"UA SPML","rendimiento_cant":110,"rendimiento_udm":"GR","ingredients":[{"name":"PECHUGA DE POLLO 4 OZ.","cant":120.0,"udm":"GR"},{"name":"MALTODEXTRINA","cant":0.09999999999999999,"udm":"GR"},{"name":"SAZONADOR ESTÁNDAR","cant":3.0,"udm":"GR"},{"name":"AGUA","cant":10.0,"udm":"GR"},{"name":"ALMIDON DE YUCA","cant":7.5,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":0.19999999999999998,"udm":"GR"},{"name":"CINTA DE ESP s hongos en juliana, saltear a fuego alto durante 2–3 minutos.\n6. Sazonar con sal y pimienta blanca.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"ACEITE DE CHILE","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":1,"rendimiento_udm":"GR","ingredients":[{"name":"ACEITE VEGETAL","cant":0.9,"udm":"GR"},{"name":"CHILE EN ESCAMAS","cant":0.25,"udm":"GR"}],"metodo":"1. Calentar suavemente el aceite vegetal en una sartén pequeña sin que llegue a humear.\n2. Añadir las escamas de chile y mezclar durante unos segundos para que liberen aroma y sabor.\n3. Retirar del fuego y dejar reposar hasta enfriar.\n4. Filtrar para retirar exceso de escamas y ajustar al rendimiento.\n5. Enfriar de acuerdo con estándares HACCP."},{"name":"FIDEOS DE ARROZ SALTEADOS CON ESPINACAS, HONGOS Y PIMIENTOS","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":150,"rendimiento_udm":"GR","ingredients":[{"name":"FIDEOS DE ARROZ","cant":60.0,"udm":"GR"},{"name":"ESPINACA FRESCA","cant":25.0,"udm":"GR"},{"name":"CHAMPIÑÓN FRESCO","cant":20.0,"udm":"GR"},{"name":"CHILE ROJO","cant":15.0,"udm":"GR"},{"name":"CHILE AMARILLO","cant":15.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":5.0,"udm":"GR"},{"name":"SALSA DE SOYA","cant":5.0,"udm":"GR"},{"name":"AJO FRESCO PICADO","cant":1.0,"udm":"GR"},{"name":"SAL","cant":0.5,"udm":"GR"},{"name":"PIMIENTA BLANCA MOLIDA","cant":0.2,"udm":"GR"}],"metodo":"1. Hidratar los fideos de arroz en agua caliente hasta que estén tiernos, escurrir y reservar.\n2. Lavar y cortar los pimientos en juliana, los champiñones en láminas y la espinaca en tiras gruesas.\n3. Calentar el aceite en un wok o sartén amplia, añadir el ajo picado y sofreír brevemente.\n4. Incorporar los champiñones y pimientos, saltear a fuego alto durante 2–3 minutos.\n5. Añadir la espinaca y cocinar hasta que reduzca su volumen.\n6. Agregar los fideos hidratados, mezclar con los vegetales y condimentar con salsa de soya, sal y pimienta blanca.\n7. Saltear todo junto 2 minutos más para integrar sabores.\n8. Verificar rendimiento final de 150 GR.\n9. Enfriar de acuerdo con estándares HACCP."},{"name":"EDAMAME SALTEADO","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":80,"rendimiento_udm":"GR","ingredients":[{"name":"EDAMAME CONGELADO","cant":85.0,"udm":"GR"},{"name":"ACEITE DE AJONJOLÍ","cant":2.0,"udm":"GR"},{"name":"SALSA DE SOYA","cant":2.0,"udm":"GR"},{"name":"AJO FRESCO PICADO","cant":0.5,"udm":"GR"},{"name":"JENGIBRE FRESCO RALLADO","cant":0.5,"udm":"GR"},{"name":"SAL","cant":0.3,"udm":"GR"}],"metodo":"1. Lavar el edamame descongelado y escurrir bien.\n2. Calentar el aceite de ajonjolí en un wok o sartén a fuego medio-alto.\n3. Añadir el ajo y el jengibre, saltear brevemente hasta que desprendan aroma.\n4. Incorporar el edamame y saltear durante 3–4 minutos, mezclando constantemente.\n5. Agregar la salsa de soya y la sal, continuar la cocción 1 minuto más.\n6. Verificar rendimiento final de 80 GR.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"COLIFLOR SALTEADA CON SOYA","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":30,"rendimiento_udm":"GR","ingredients":[{"name":"COLIFLOR FRESCA","cant":35.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":1.5,"udm":"GR"},{"name":"SALSA DE SOYA","cant":2.0,"udm":"GR"},{"name":"AJO FRESCO PICADO","cant":0.3,"udm":"GR"},{"name":"JENGIBRE FRESCO RALLADO","cant":0.2,"udm":"GR"}],"metodo":"1. Lavar y cortar la coliflor en floretes pequeños y uniformes.\n2. Calentar el aceite en un wok o sartén a fuego medio-alto.\n3. Incorporar el ajo y el jengibre, saltear brevemente hasta que desprendan aroma.\n4. Añadir la coliflor y saltear durante 4–5 minutos hasta que esté tierna pero firme.\n5. Agregar la salsa de soya y mezclar bien para integrar sabores.\n6. Verificar rendimiento final de 30 GR.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"PERLAS DE AGAR AGAR CON INFUSIÓN DE TÉ VERDE","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":50,"rendimiento_udm":"GR","ingredients":[{"name":"INFUSIÓN DE TÉ VERDE","cant":60.0,"udm":"GR"},{"name":"AGAR-AGAR EN POLVO","cant":1.0,"udm":"GR"},{"name":"AZÚCAR","cant":5.0,"udm":"GR"},{"name":"ACEITE VEGETAL","cant":200.0,"udm":"GR"}],"metodo":"1. Preparar una infusión concentrada de té verde y reservar 60 GR.\n2. Disolver el agar-agar en polvo en la infusión caliente junto con el azúcar. Cocinar 2 minutos a fuego bajo removiendo constantemente.\n3. Dejar entibiar ligeramente la mezcla hasta unos 50 °C.\n4. Con ayuda de una jeringa o pipeta, dejar caer gotas de la mezcla en un recipiente con aceite frío, formando pequeñas perlas gelificadas.\n5. Escurrir las perlas y enjuagarlas.\n6. Verificar rendimiento final de 50 GR.\n7. Enfriar de acuerdo con estándares HACCP."},{"name":"INFUSIÓN DE TÉ VERDE","sheet":"UA VOML","source":"UA SPML","rendimiento_cant":60,"rendimiento_udm":"GR","ingredients":[{"name":"TÉ VERDE EN POLVO (MATCHA)","cant":1.0,"udm":"GR"},{"name":"AGUA","cant":65.0,"udm":"GR"}],"metodo":"1. Calentar el agua a 80 °C.\n2. Disolver el té verde en polvo en un poco de agua caliente, batiendo con batidor pequeño o espumador hasta eliminar grumos.\n3. Incorporar el resto del agua caliente y mezclar hasta homogeneizar.\n4. Dejar reposar 1 minuto para estabilizar la infusión.\n5. Verificar rendimiento final de 60 GR.\n6. Enfriar de acuerdo con estándares HACCP."}];

let curR=null,curUnit="porciones",activeSource="TODOS",q="";

function getSources(){return["TODOS",...new Set(R.map(r=>r.sheet))];}

function buildChips(){
  const chips=document.getElementById("chips");
  chips.innerHTML="";
  getSources().forEach(s=>{
    const b=document.createElement("button");
    b.className="chip"+(s===activeSource?" on":"");
    b.textContent=s;
    b.onclick=()=>{activeSource=s;buildChips();renderList();};
    chips.appendChild(b);
  });
}

function toggleDrawer(){
  const d=document.getElementById("drawer");
  const b=document.getElementById("src-btn");
  const open=d.classList.toggle("open");
  b.classList.toggle("on",open);
  if(open)buildChips();
}

function doFilter(){q=document.getElementById("search").value.trim().toLowerCase();renderList();}

function filtered(){
  return R.filter(r=>{
    const srcOk=activeSource==="TODOS"||r.sheet===activeSource;
    if(!srcOk)return false;
    if(!q)return true;
    if(r.name.toLowerCase().includes(q))return true;
    if((r.sheet||"").toLowerCase().includes(q))return true;
    if(r.ingredients&&r.ingredients.some(i=>i.name.toLowerCase().includes(q)))return true;
    return false;
  });
}

function renderList(){
  const list=filtered();
  document.getElementById("res-bar").textContent=list.length+" receta"+(list.length!==1?"s":"");
  const g=document.getElementById("grid");
  if(!list.length){g.innerHTML='<div class="empty">Sin resultados para "'+q+'"</div>';return;}
  g.innerHTML=list.map(r=>{
    const idx=R.indexOf(r);
    return '<div class="card" onclick="openDetail('+idx+')"><div class="card-tag">'+r.sheet+'</div><div class="card-name">'+r.name+'</div><div class="card-meta">'+r.rendimiento_cant+' '+r.rendimiento_udm+' · '+r.ingredients.length+' ing.</div></div>';
  }).join("");
}

function openDetail(idx){
  curR=R[idx];
  document.getElementById("d-name").textContent=curR.name;
  document.getElementById("d-src").textContent=curR.sheet+" · "+curR.source;
  document.getElementById("m-ing").textContent=curR.ingredients.length;
  document.getElementById("qty").value=1;
  setUnit("porciones");
  document.getElementById("detail-view").classList.add("open");
  saveLog({user:currentUser.nombre,codigo:currentUser.codigo,recipe:curR.name,sheet:curR.sheet,ts:new Date().toISOString()});
  renderMetodo();
}

function closeDetail(){document.getElementById("detail-view").classList.remove("open");}

function setUnit(u){
  curUnit=u;
  document.getElementById("utabs").innerHTML=["porciones","kg","lb"].map(t=>'<button class="utab'+(t===u?" on":"")+'" onclick="setUnit(\''+(t)+'\')">'+t+"</button>").join("");
  recalc();
}

function chg(d){
  const inp=document.getElementById("qty");
  let v=parseFloat(inp.value)||1;
  if(curUnit==="porciones")v=Math.max(1,Math.round(v+d));
  else v=Math.max(0.1,Math.round((v+d*0.5)*10)/10);
  inp.value=v;recalc();
}

function getFactor(){
  const v=parseFloat(document.getElementById("qty").value)||1;
  const rc=curR.rendimiento_cant||1;
  const ru=(curR.rendimiento_udm||"GR").toUpperCase();
  if(curUnit==="porciones")return v;
  const gr=ru==="KG"?rc*1000:ru==="LB"?rc*453.592:rc;
  if(curUnit==="kg")return(v*1000)/gr;
  return(v*453.592)/gr;
}

function fmt(n){
  if(n===0)return"0";
  if(n<0.01)return n.toFixed(4);
  if(n<1)return n.toFixed(3);
  if(n<100)return n.toFixed(2);
  return n.toFixed(1);
}

function recalc(){
  const f=getFactor();
  const rc=curR.rendimiento_cant||0;
  const ru=curR.rendimiento_udm||"GR";
  document.getElementById("m-factor").textContent=f.toFixed(3)+"×";
  document.getElementById("m-rend").textContent=fmt(rc*f);
  document.getElementById("m-udm").textContent=ru;
  document.getElementById("ing-list").innerHTML=curR.ingredients.map(ing=>{
    const sc=ing.cant*f;
    const udm=(ing.udm||"GR").toUpperCase();
    const lb=udm==="GR"?'<div class="ing-lb">'+(sc/453.592).toFixed(3)+" lb</div>":"";
    return '<div class="ing-row"><div class="ing-name">'+ing.name+'</div><div class="ing-right"><div class="ing-base">'+ing.cant+" "+ing.udm+'</div><div class="ing-scaled">'+fmt(sc)+" "+ing.udm+"</div>"+lb+"</div></div>";
  }).join("");
}

function renderMetodo(){
  const box=document.getElementById("metodo-box");
  const steps=document.getElementById("metodo-steps");
  if(!curR.metodo){box.style.display="none";return;}
  box.style.display="block";
  const lines=curR.metodo.trim().split("\n").map(l=>l.trim().replace(/^\d+[.)\-]\s*/,"")).filter(l=>l);
  steps.innerHTML=lines.map((l,i)=>'<div class="metodo-step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+l+"</div></div>").join("");
}

let logs=[],adminFilter="TODOS";
function openAdmin(){
  document.getElementById("admin-view").classList.add("open");
  loadLogs();
}
function closeAdmin(){document.getElementById("admin-view").classList.remove("open");}
async function loadLogs(){
  try{
    const res=await fetch(SHEET_URL+"?action=get");
    logs=await res.json();
    renderAdmin();
  }catch(e){
    document.getElementById("log-table").innerHTML='<div class="log-empty">No se pudieron cargar los registros.</div>';
  }
}
function renderAdmin(){
  const users=[...new Set(logs.map(l=>l.user||l.codigo))];
  document.getElementById("admin-stats").innerHTML='<div class="stat-card"><div class="stat-num">'+logs.length+'</div><div class="stat-lbl">Consultas totales</div></div><div class="stat-card"><div class="stat-num">'+users.length+'</div><div class="stat-lbl">Usuarios activos</div></div>';
  const filters=["TODOS",...users];
  document.getElementById("admin-filters").innerHTML=filters.map(f=>'<button class="admin-filter-btn'+(f===adminFilter?" on":"")+'" onclick="setAdminFilter(\''+(f)+'\')">'+f+"</button>").join("");
  const shown=adminFilter==="TODOS"?logs:logs.filter(l=>(l.user||l.codigo)===adminFilter);
  if(!shown.length){document.getElementById("log-table").innerHTML='<div class="log-empty">Sin registros.</div>';return;}
  document.getElementById("log-table").innerHTML=shown.slice(-50).reverse().map(l=>{
    const ini=(l.user||"??").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const ts=l.ts?new Date(l.ts).toLocaleString("es-SV",{dateStyle:"short",timeStyle:"short"}):"\u2014";
    return '<div class="log-row"><div class="log-avatar">'+ini+'</div><div class="log-info"><div class="log-name">'+(l.user||l.codigo)+'</div><div class="log-recipe">'+l.recipe+"</div></div>"+('<div class="log-time">'+ts+"</div></div>");
  }).join("");
}
function setAdminFilter(f){adminFilter=f;renderAdmin();}
</script>
