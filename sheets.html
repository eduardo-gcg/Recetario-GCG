<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario GCG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --azul:    #1C4656;
    --teal:    #007B82;
    --dorado:  #C9A571;
    --claro:   #F4F1EC;
    --blanco:  #FFFFFF;
    --texto:   #1a1a1a;
    --sutil:   #6b6b6b;
    --borde:   #ddd8cf;
    --danger:  #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--claro); color: var(--texto); }

  /* ─── LOGIN ─── */
  #pantalla-login {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; background: var(--azul); gap: 0;
    background-image: radial-gradient(ellipse at 70% 20%, rgba(0,123,130,.3) 0%, transparent 60%);
  }
  .login-logo { width: 90px; margin-bottom: 16px; filter: brightness(0) invert(1); }
  .login-titulo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--blanco); letter-spacing: 1px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 4px; margin-bottom: 32px; letter-spacing: 2px; text-transform: uppercase; }
  .login-card {
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
    border-radius: 16px; padding: 32px 36px; width: 300px; backdrop-filter: blur(10px);
  }
  .login-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 8px; display: block; }
  .login-input {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.08);
    color: var(--blanco); font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border .2s;
  }
  .login-input:focus { border-color: var(--dorado); }
  .login-input::placeholder { color: rgba(255,255,255,.3); }
  .login-btn {
    width: 100%; padding: 13px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--dorado); color: var(--azul); font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 15px; margin-top: 20px; transition: opacity .2s;
  }
  .login-btn:hover { opacity: .85; }
  .login-error { color: #ff8080; font-size: 13px; margin-top: 12px; display: none; text-align: center; }

  /* ─── LAYOUT PRINCIPAL ─── */
  #app { display: none; height: 100vh; flex-direction: column; }

  /* TOPBAR */
  .topbar {
    background: var(--azul); color: var(--blanco);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 56px; flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
  }
  .topbar-izq { display: flex; align-items: center; gap: 14px; }
  .topbar-logo { height: 30px; filter: brightness(0) invert(1); }
  .topbar-titulo { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: .5px; }
  .topbar-der { display: flex; align-items: center; gap: 10px; }
  .user-badge { font-size: 12px; color: rgba(255,255,255,.6); }
  .btn-salir {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    color: var(--blanco); padding: 5px 12px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
  }
  .sync-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px;
    background: rgba(0,123,130,.25); color: #4ecdc4;
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ecdc4; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* CONTENIDO */
  .contenido { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 300px; flex-shrink: 0; background: var(--blanco);
    border-right: 1px solid var(--borde); display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-top { padding: 16px; border-bottom: 1px solid var(--borde); }
  .buscador {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--borde); font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--claro); outline: none; transition: border .2s;
  }
  .buscador:focus { border-color: var(--teal); }
  .filtros { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .filtro-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--borde);
    background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif;
    color: var(--sutil); transition: all .15s; white-space: nowrap;
  }
  .filtro-btn.activo { background: var(--azul); color: var(--blanco); border-color: var(--azul); }
  .contador-res { font-size: 11px; color: var(--sutil); padding: 8px 16px 4px; letter-spacing: 1px; text-transform: uppercase; }
  .lista-recetas { overflow-y: auto; flex: 1; }
  .item-receta {
    padding: 12px 16px; border-bottom: 1px solid var(--borde); cursor: pointer;
    transition: background .15s; display: flex; flex-direction: column; gap: 3px;
  }
  .item-receta:hover { background: var(--claro); }
  .item-receta.activo { background: #e8f4f5; border-left: 3px solid var(--teal); }
  .item-nombre { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .item-fuente { font-size: 11px; color: var(--sutil); }
  .sidebar-loading { padding: 40px 20px; text-align: center; color: var(--sutil); font-size: 13px; }
  .sidebar-vacio { padding: 40px 20px; text-align: center; color: var(--sutil); font-size: 13px; }

  /* PANEL PRINCIPAL */
  .panel-principal { flex: 1; overflow-y: auto; padding: 28px; }
  .bienvenida { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--sutil); }
  .bienvenida-icon { font-size: 52px; }
  .bienvenida h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--azul); }
  .bienvenida p { font-size: 14px; }

  /* DETALLE RECETA */
  .receta-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .receta-nombre { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--azul); line-height: 1.2; }
  .receta-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px;
    border-radius: 20px; font-weight: 500;
  }
  .tag-fuente { background: var(--azul); color: var(--blanco); }
  .tag-rend { background: rgba(201,165,113,.2); color: #8a6b35; }

  /* ESCALADOR */
  .escalador-card {
    background: var(--blanco); border-radius: 12px; padding: 20px 24px;
    border: 1px solid var(--borde); margin-bottom: 24px;
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .escalador-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--sutil); margin-bottom: 6px; }
  .escalador-input {
    width: 110px; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--borde); font-family: 'DM Sans', sans-serif; font-size: 20px;
    font-weight: 600; color: var(--azul); text-align: center; outline: none;
  }
  .escalador-input:focus { border-color: var(--teal); }
  .factor-display { font-size: 13px; color: var(--sutil); }
  .factor-val { color: var(--dorado); font-weight: 600; }
  .btn-imprimir {
    margin-left: auto; padding: 10px 18px; border-radius: 8px; border: 1px solid var(--borde);
    background: var(--blanco); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px;
    display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .btn-imprimir:hover { background: var(--claro); }

  /* TABLA INGREDIENTES */
  .ingredientes-titulo { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--sutil); margin-bottom: 12px; }
  .tabla-ingredientes {
    width: 100%; border-collapse: collapse; background: var(--blanco);
    border-radius: 12px; overflow: hidden; border: 1px solid var(--borde);
  }
  .tabla-ingredientes thead { background: var(--azul); color: var(--blanco); }
  .tabla-ingredientes th { padding: 10px 16px; text-align: left; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .tabla-ingredientes td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--borde); }
  .tabla-ingredientes tbody tr:last-child td { border-bottom: none; }
  .tabla-ingredientes tbody tr:hover { background: var(--claro); }
  .col-desc { font-weight: 500; }
  .col-num { text-align: right; font-variant-numeric: tabular-nums; }
  .col-costo { text-align: right; color: var(--teal); font-weight: 500; }
  .tfoot-total td { border-top: 2px solid var(--borde); font-weight: 600; background: var(--claro); }

  /* Cargando detalle */
  .cargando-detalle { padding: 60px; text-align: center; color: var(--sutil); }

  /* ADMIN PANEL */
  .admin-bar {
    background: rgba(201,165,113,.12); border: 1px solid rgba(201,165,113,.4);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #8a6b35;
  }
  .admin-bar strong { margin-right: auto; }

  /* ESTADO SYNC */
  .estado-sync { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .sync-ok { background: rgba(78,205,196,.15); color: #2a8a85; }
  .sync-err { background: rgba(192,57,43,.1); color: var(--danger); }
  .sync-cargando { background: rgba(0,0,0,.05); color: var(--sutil); }

  @media print {
    .topbar, .sidebar, .escalador-card .btn-imprimir, .filtros, .buscador { display: none !important; }
    .sidebar { display: none; }
    .panel-principal { padding: 10px; }
  }
  @media (max-width: 700px) {
    .sidebar { width: 100%; height: auto; max-height: 45vh; }
    .contenido { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════ LOGIN ═══════════════════════════ -->
<div id="pantalla-login">
  <img class="login-logo" id="logo-login" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn5Ku77iPPC90ZXh0Pjwvc3ZnPg==" alt="GCG">
  <div class="login-titulo">Recetario GCG</div>

<!-- ═══════════════════════════ APP ═══════════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-izq">
      <img class="topbar-logo" id="logo-app" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn5Ku77iPPC90ZXh0Pjwvc3ZnPg==" alt="GCG">
      <div class="topbar-titulo">Recetario GCG</div>
    </div>
    <div class="topbar-der">
      <div class="sync-badge"><div class="sync-dot"></div><span id="sync-status">Conectando…</span></div>
      <div class="user-badge" id="user-badge"></div>
      <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>

  <div class="contenido">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-top">
        <input class="buscador" id="buscador" type="text" placeholder="Buscar receta o ingrediente…" oninput="filtrarLista()">
        <div class="filtros" id="filtros-fuente"></div>
      </div>
      <div class="contador-res" id="contador-res"></div>
      <div class="lista-recetas" id="lista-recetas">
        <div class="sidebar-loading">Cargando recetas desde Google Sheets…</div>
      </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div class="panel-principal" id="panel-principal">
      <div class="bienvenida" id="bienvenida">
        <div class="bienvenida-icon">🍽️</div>
        <h2>Seleccioná una receta</h2>
        <p>Usá el buscador o los filtros del panel izquierdo</p>
      </div>
      <div id="detalle-receta" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════ CONFIGURACIÓN ═══════════════
// ⚠️ REEMPLAZÁ esta URL con tu URL del Apps Script
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXQWmn64NFYKyksxDKhhtR1QAvIxMUsYEYR61Dd3Zx09ew6CeLYIyIHdl_4dCyizmIow/exec';

// Base de datos de empleados (igual que antes)
const EMPLEADOS = [
  // ── Producción ──
  {codigo:'101',pin:'1234',nombre:'Carlos Menjívar',depto:'Producción'},
  {codigo:'102',pin:'2345',nombre:'Ana Hernández',depto:'Producción'},
  {codigo:'103',pin:'3456',nombre:'Luis Rivas',depto:'Producción'},
  {codigo:'104',pin:'4567',nombre:'María Gutiérrez',depto:'Producción'},
  {codigo:'105',pin:'5678',nombre:'José Martínez',depto:'Producción'},
  {codigo:'106',pin:'6789',nombre:'Rosa Flores',depto:'Producción'},
  {codigo:'107',pin:'7890',nombre:'Pedro Vásquez',depto:'Producción'},
  {codigo:'108',pin:'8901',nombre:'Carmen López',depto:'Producción'},
  {codigo:'109',pin:'9012',nombre:'Roberto Cruz',depto:'Producción'},
  {codigo:'110',pin:'0123',nombre:'Elena Morales',depto:'Producción'},
  {codigo:'111',pin:'1357',nombre:'Manuel Sánchez',depto:'Producción'},
  {codigo:'112',pin:'2468',nombre:'Isabel Jiménez',depto:'Producción'},
  {codigo:'113',pin:'3579',nombre:'Fernando Alvarado',depto:'Producción'},
  {codigo:'114',pin:'4680',nombre:'Patricia Reyes',depto:'Producción'},
  {codigo:'115',pin:'5791',nombre:'Héctor Mendoza',depto:'Producción'},
  {codigo:'116',pin:'6802',nombre:'Gloria Castillo',depto:'Producción'},
  {codigo:'117',pin:'7913',nombre:'Diego Ramírez',depto:'Producción'},
  {codigo:'118',pin:'8024',nombre:'Silvia Torres',depto:'Producción'},
  // ── Outsourcing ──
  {codigo:'201',pin:'1111',nombre:'Andrés Peralta',depto:'Outsourcing'},
  {codigo:'202',pin:'2222',nombre:'Claudia Fuentes',depto:'Outsourcing'},
  {codigo:'203',pin:'3333',nombre:'Mario Rodríguez',depto:'Outsourcing'},
  {codigo:'204',pin:'4444',nombre:'Laura Velásquez',depto:'Outsourcing'},
  {codigo:'205',pin:'5555',nombre:'Oscar Molina',depto:'Outsourcing'},
  // Supervisores / Admin
  {codigo:'9999',pin:'2024',nombre:'Administrador GCG',depto:'Admin'},
  {codigo:'7890',pin:'7890',nombre:'Eduardo — Chef Ejecutivo',depto:'Admin'},
];

// ═══════════════ ESTADO ═══════════════
let usuarioActual = null;
let todasRecetas  = [];
let recetaActual  = null;
let filtroFuente  = 'TODAS';

// ═══════════════ LOGIN ═══════════════
document.getElementById('inp-pin').addEventListener('keydown', e => { if(e.key==='Enter') intentarLogin(); });
document.getElementById('inp-codigo').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-pin').focus(); });

function intentarLogin() {
  const cod = document.getElementById('inp-codigo').value.trim();
  const pin = document.getElementById('inp-pin').value.trim();
  const emp = EMPLEADOS.find(e => e.codigo === cod && e.pin === pin);

  if (!emp) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('inp-pin').value = '';
    return;
  }

  usuarioActual = emp;
  document.getElementById('pantalla-login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-badge').textContent = emp.nombre;

  cargarRecetas();
}

function cerrarSesion() {
  usuarioActual = null; todasRecetas = []; recetaActual = null;
  document.getElementById('inp-codigo').value = '';
  document.getElementById('inp-pin').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('pantalla-login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ═══════════════ CARGA DE RECETAS ═══════════════
function fetchJSON(url) {
  return new Promise(function(resolve, reject) {
    var cbName = 'gcg_cb_' + Date.now();
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      delete window[cbName];
      document.body.removeChild(script);
      // Fallback: intentar fetch directo
      fetch(url).then(r => r.json()).then(resolve).catch(reject);
    }, 8000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (document.body.contains(script)) document.body.removeChild(script);
      resolve(data);
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[cbName];
      // Fallback fetch directo
      fetch(url).then(r => r.json()).then(resolve).catch(reject);
    };
    document.body.appendChild(script);
  });
}

async function cargarRecetas() {
  document.getElementById('sync-status').textContent = 'Cargando…';
  document.getElementById('lista-recetas').innerHTML = '<div class="sidebar-loading">Cargando recetas desde Google Sheets…</div>';

  try {
    // Intentar fetch directo primero
    let json;
    try {
      const resp = await fetch(SCRIPT_URL + '?action=listar');
      json = await resp.json();
    } catch(e) {
      // Si falla por CORS, usar fetch con mode no-cors no sirve para leer
      // Re-lanzar para mostrar error claro
      throw new Error('No se pudo conectar al servidor. Verificá que el Apps Script esté implementado como "Cualquier persona".');
    }

    if (json.error) throw new Error(json.error);

    todasRecetas = json.recetas || [];
    document.getElementById('sync-status').textContent = todasRecetas.length + ' recetas ✓';

    construirFiltros();
    renderLista(todasRecetas);

  } catch(err) {
    document.getElementById('sync-status').textContent = 'Error de conexión';
    document.getElementById('lista-recetas').innerHTML =
      '<div class="sidebar-vacio">⚠️ ' + err.message + '<br><br><button onclick="cargarRecetas()" style="padding:8px 16px;border-radius:6px;border:1px solid #ccc;cursor:pointer;font-family:inherit">Reintentar</button></div>';
  }
}

function construirFiltros() {
  const fuentes = [...new Set(todasRecetas.map(r => r.fuente).filter(Boolean))].sort();
  const cont = document.getElementById('filtros-fuente');
  cont.innerHTML = '';

  const btnTodas = document.createElement('button');
  btnTodas.className = 'filtro-btn activo';
  btnTodas.textContent = 'Todas';
  btnTodas.onclick = () => setFiltro('TODAS');
  cont.appendChild(btnTodas);

  fuentes.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'filtro-btn';
    btn.textContent = f;
    btn.onclick = () => setFiltro(f);
    cont.appendChild(btn);
  });
}

function setFiltro(fuente) {
  filtroFuente = fuente;
  document.querySelectorAll('.filtro-btn').forEach(b => {
    b.classList.toggle('activo', b.textContent === (fuente === 'TODAS' ? 'Todas' : fuente));
  });
  filtrarLista();
}

function filtrarLista() {
  const q = document.getElementById('buscador').value.toLowerCase().trim();
  let resultado = todasRecetas;

  if (filtroFuente !== 'TODAS') {
    resultado = resultado.filter(r => r.fuente === filtroFuente);
  }
  if (q) {
    resultado = resultado.filter(r =>
      r.nombre.toLowerCase().includes(q) ||
      (r.fuente || '').toLowerCase().includes(q)
    );
  }
  renderLista(resultado);
}

function renderLista(recetas) {
  const cont = document.getElementById('lista-recetas');
  document.getElementById('contador-res').textContent = recetas.length + ' receta' + (recetas.length !== 1 ? 's' : '');

  if (!recetas.length) {
    cont.innerHTML = '<div class="sidebar-vacio">Sin resultados para esa búsqueda.</div>';
    return;
  }

  cont.innerHTML = '';
  recetas.forEach(r => {
    const div = document.createElement('div');
    div.className = 'item-receta' + (recetaActual && recetaActual.id === r.id ? ' activo' : '');
    div.innerHTML = `<div class="item-nombre">${r.nombre}</div><div class="item-fuente">${r.fuente || ''}</div>`;
    div.onclick = () => abrirReceta(r.id);
    cont.appendChild(div);
  });
}

// ═══════════════ DETALLE DE RECETA ═══════════════
async function abrirReceta(id) {
  // Marcar activo en lista
  document.querySelectorAll('.item-receta').forEach(el => el.classList.remove('activo'));

  document.getElementById('bienvenida').style.display = 'none';
  document.getElementById('detalle-receta').style.display = 'block';
  document.getElementById('detalle-receta').innerHTML = '<div class="cargando-detalle">Cargando receta…</div>';

  try {
    const resp = await fetch(SCRIPT_URL + '?action=detalle&id=' + encodeURIComponent(id));
    const json = await resp.json();
    if (json.error) throw new Error(json.error);

    recetaActual = json.receta;
    renderDetalle(recetaActual);

    // Registrar uso
    registrarUso(recetaActual.nombre, recetaActual.fuente);

    // Marcar en lista
    document.querySelectorAll('.item-receta').forEach(el => {
      if (el.querySelector('.item-nombre').textContent === recetaActual.nombre) el.classList.add('activo');
    });

  } catch(err) {
    document.getElementById('detalle-receta').innerHTML =
      '<div class="cargando-detalle">⚠️ Error al cargar: ' + err.message + '</div>';
  }
}

function renderDetalle(receta) {
  const rendBase = receta.rendimiento_cant || 1;
  const udm = receta.rendimiento_udm || 'PORCIONES';
  const ings = receta.ingredientes || [];
  const esAdmin = usuarioActual && (usuarioActual.codigo === '9999' || usuarioActual.codigo === '7890');

  const html = `
    ${esAdmin ? `<div class="admin-bar"><strong>⚙️ Vista de administrador</strong>
      <span class="estado-sync sync-ok">Google Sheets</span>
    </div>` : ''}

    <div class="receta-header">
      <div>
        <div class="receta-nombre">${receta.nombre}</div>
        <div class="receta-meta">
          ${receta.fuente ? `<span class="tag tag-fuente">${receta.fuente}</span>` : ''}
          <span class="tag tag-rend">Rinde: ${rendBase} ${udm}</span>
          ${receta.categoria ? `<span class="tag" style="background:var(--claro);color:var(--sutil)">${receta.categoria}</span>` : ''}
        </div>
      </div>
    </div>

    <div class="escalador-card">
      <div>
        <div class="escalador-label">Cantidad a producir (${udm})</div>
        <input class="escalador-input" id="inp-escala" type="number" value="${rendBase}" min="1"
          oninput="actualizarEscala(${rendBase})">
      </div>
      <div class="factor-display">
        Factor: <span class="factor-val" id="factor-val">1.00×</span><br>
        <small>Base: ${rendBase} ${udm}</small>
      </div>
      <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir</button>
    </div>

    <div class="ingredientes-titulo">Ingredientes</div>
    ${ings.length > 0 ? `
    <table class="tabla-ingredientes" id="tabla-ings">
      <thead>
        <tr>
          <th>#</th>
          <th>Descripción</th>
          <th class="col-num">Cantidad</th>
          <th>UDM</th>
          ${esAdmin ? '<th class="col-costo">Costo</th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${ings.map((ing, i) => `
          <tr>
            <td style="color:var(--sutil)">${i+1}</td>
            <td class="col-desc">${ing.descripcion}</td>
            <td class="col-num" id="cant-${i}" data-base="${ing.cantidad}">${fmtNum(ing.cantidad)}</td>
            <td>${ing.udm}</td>
            ${esAdmin ? `<td class="col-costo" id="costo-${i}" data-base="${ing.costo_linea}">$${fmtNum(ing.costo_linea)}</td>` : ''}
          </tr>
        `).join('')}
      </tbody>
      ${esAdmin ? `<tfoot>
        <tr class="tfoot-total">
          <td colspan="4" style="text-align:right;padding-right:8px">Costo total:</td>
          <td class="col-costo" id="costo-total">$${fmtNum(receta.costo_total)}</td>
        </tr>
      </tfoot>` : ''}
    </table>` : '<div style="padding:24px;color:var(--sutil);text-align:center">Esta receta no tiene ingredientes registrados.</div>'}
  `;

  document.getElementById('detalle-receta').innerHTML = html;
}

function actualizarEscala(rendBase) {
  const val = parseFloat(document.getElementById('inp-escala').value) || rendBase;
  const factor = val / rendBase;
  document.getElementById('factor-val').textContent = factor.toFixed(2) + '×';

  // Actualizar cantidades
  const ings = recetaActual ? recetaActual.ingredientes || [] : [];
  ings.forEach((_, i) => {
    const elCant = document.getElementById('cant-' + i);
    const elCosto = document.getElementById('costo-' + i);
    if (elCant) {
      const base = parseFloat(elCant.dataset.base) || 0;
      elCant.textContent = fmtNum(base * factor);
    }
    if (elCosto) {
      const base = parseFloat(elCosto.dataset.base) || 0;
      elCosto.textContent = '$' + fmtNum(base * factor);
    }
  });

  // Total
  const elTotal = document.getElementById('costo-total');
  if (elTotal && recetaActual) {
    elTotal.textContent = '$' + fmtNum((recetaActual.costo_total || 0) * factor);
  }
}

// ═══════════════ REGISTRO DE USO ═══════════════
async function registrarUso(nombreReceta, fuente) {
  if (!SCRIPT_URL || SCRIPT_URL.includes('TU_URL')) return;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'registrar_uso',
        codigo: usuarioActual.codigo,
        nombre: usuarioActual.nombre,
        receta: nombreReceta,
        fuente: fuente || ''
      })
    });
  } catch(e) { /* silencioso */ }
}

// ═══════════════ UTILIDADES ═══════════════
function fmtNum(n) {
  const num = parseFloat(n) || 0;
  if (num === 0) return '0';
  if (num < 0.01) return num.toFixed(4);
  if (num < 1) return num.toFixed(3);
  if (num < 10) return num.toFixed(2);
  return num.toFixed(1);
}
</script>
</body>
</html>
